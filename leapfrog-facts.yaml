# leapfrog-facts.yaml — Did You Know panel for corporate.woodfinegroup.com home page
#
# Rendered as the right-column panel on the home page (label rendered by
# the engine; this YAML supplies the body bullets). Engine reads on each
# request; absent → suppress panel; present → render bulleted list with
# optional wikilink anchors.
#
# Schema:
#   facts:
#     - text: <one sentence drawn from a TOPIC, banker register, no marketing copy>
#       link_slug: <slug of the source TOPIC for [more] link>
#
# Reader: institutional financial community. Each fact should move the
# banker from "I've never heard of these structures" to "wait, that's not
# how it normally works in pooled commercial real estate."
#
# Updated: 2026-05-09 by project-editorial Task — initial publication

facts:
  - text: "A financial event affecting one asset — vacancy, litigation, refinancing — cannot propagate to the investor's equity in a different asset."
    link_slug: direct-hold-framework

  - text: "Long-term equity compounds without the structural drag of a cash reserve that earns less than the underlying assets."
    link_slug: redemption-elimination

  - text: "At 1.2x interest coverage, the corporate entity accepts a tighter margin in exchange for higher leverage capacity — maximising the deployable asset base while maintaining the mathematical assurance that operating income covers debt."
    link_slug: interest-coverage-ratio

  - text: "An investor seeking liquidity locates a willing counterparty through their own commercial relationships or through broker-dealer channels that operate independently of the corporate entity."
    link_slug: equity-transfer-model

  - text: "The corporate entity holds the private keys, the physical hardware, and operational control of the ledger software stack — a corporate entity that owns a building but cannot access the ledger proving it owns the building is functionally dispossessed."
    link_slug: fiduciary-data-mandate
